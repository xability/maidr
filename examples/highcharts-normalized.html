<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Highcharts Normalized (Percent-Stacked) Bar - MAIDR</title>
    <script src="https://cdn.jsdelivr.net/npm/highcharts/highcharts.js"></script>
    <script type="text/javascript" src="../dist/maidr.js"></script>
    <script type="text/javascript" src="../dist/highcharts.js"></script>
  </head>
  <body>
    <h1>Highcharts Normalized (Percent-Stacked) Bar Chart</h1>
    <p>
      A Highcharts percent-stacked column chart made accessible by the MAIDR Highcharts adapter.
      Click on the chart and use arrow keys to navigate stacks; up/down to switch between segments.
    </p>

    <div id="normalized-chart" style="width: 700px; height: 500px"></div>

    <script>
      const chart = Highcharts.chart('normalized-chart', {
        chart: { type: 'column' },
        title: { text: 'Quarterly Revenue Share by Product' },
        xAxis: {
          categories: ['Q1', 'Q2', 'Q3', 'Q4'],
          title: { text: 'Quarter' },
        },
        yAxis: { title: { text: 'Share of Revenue (%)' } },
        plotOptions: { column: { stacking: 'percent' } },
        series: [
          { name: 'Product A', data: [20, 14, 23, 25] },
          { name: 'Product B', data: [15, 18, 20, 22] },
          { name: 'Product C', data: [12, 16, 18, 20] },
        ],
      });

      const maidrData = maidrHighcharts.highchartsToMaidr(chart, { id: 'normalized-chart' });
      document.getElementById('normalized-chart').setAttribute('maidr-data', JSON.stringify(maidrData));
      maidrHighcharts.createHighchartsSync(chart);
    </script>
  </body>
</html>
