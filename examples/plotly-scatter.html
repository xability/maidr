<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Plotly.js Scatter - Auto MAIDR</title>
    <!-- Plotly.js from CDN -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <!-- MAIDR - auto-detects plotly charts, no config needed -->
    <script type="text/javascript" src="../dist/maidr.js"></script>
  </head>
  <body>
    <h1>Plotly.js Scatter Plot</h1>
    <p>
      This page loads a plotly.js scatter chart and includes maidr.js.
      MAIDR auto-detects the plotly chart and makes it accessible —
      no <code>maidr-data</code> attribute or binder needed.
    </p>
    <p>Click on the chart and use arrow keys to navigate.</p>

    <div id="scatter-chart" style="width: 700px; height: 500px"></div>

    <script>
      // Iris-like dataset
      var trace1 = {
        x: [5.1, 4.9, 4.7, 4.6, 5.0, 5.4, 4.6, 5.0, 4.4, 4.9,
            5.4, 4.8, 4.8, 4.3, 5.8, 5.7, 5.4, 5.1, 5.7, 5.1],
        y: [1.4, 1.4, 1.3, 1.5, 1.4, 1.7, 1.4, 1.5, 1.4, 1.5,
            1.5, 1.6, 1.4, 1.1, 1.2, 1.5, 1.3, 1.4, 1.7, 1.5],
        mode: 'markers',
        type: 'scatter',
        name: 'Setosa',
        marker: { size: 8, color: '#1f77b4' }
      };

      var layout = {
        title: { text: 'Iris Sepal Length vs Petal Length' },
        xaxis: { title: { text: 'Sepal Length (cm)' } },
        yaxis: { title: { text: 'Petal Length (cm)' } }
      };

      Plotly.newPlot('scatter-chart', [trace1], layout);
    </script>
  </body>
</html>
