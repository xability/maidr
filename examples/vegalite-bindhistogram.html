<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MAIDR + Vega-Lite Histogram Example</title>
    <!-- Vega-Lite and its dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <!-- MAIDR Vega-Lite adapter (bundles MAIDR core) -->
    <script src="../dist/vegalite.js"></script>
  </head>
  <body>
    <h1>MAIDR + Vega-Lite Histogram</h1>
    <p>Click on the chart and use arrow keys to navigate. Press 'b' for braille, 't' for text descriptions.</p>
    <div
      id="histogram-chart"
      aria-label="Histogram loading"
      style="min-height: 400px"
    ></div>

    <script>
      // Histogram: bar mark with `bin: true` on a quantitative x axis
      // and aggregate count on y. The MAIDR binder maps this to HISTOGRAM.
      const spec = {
        $schema: 'https://vega.github.io/schema/vega-lite/v5.json',
        width: 600,
        height: 400,
        title: 'Distribution of Values',
        data: {
          values: Array.from({ length: 100 }, () => ({
            value: Math.round(Math.random() * 100),
          })),
        },
        mark: 'bar',
        encoding: {
          x: { field: 'value', type: 'quantitative', bin: true, title: 'Value' },
          y: { aggregate: 'count', title: 'Frequency' },
        },
      };

      // === MAIDR Integration ===
      // maidrVegaLite.embed() runs vegaEmbed() internally and mounts the
      // accessible MAIDR UI on the rendered SVG once it's ready.
      maidrVegaLite
        .embed('#histogram-chart', spec, { id: 'dist-hist' })
        .catch((err) => console.error('[vegalite-bindhistogram]', err));
    </script>
  </body>
</html>
