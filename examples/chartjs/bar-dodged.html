<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MAIDR + Chart.js Dodged Bar Example</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="../../dist/chartjs.js"></script>
  </head>
  <body>
    <h1>MAIDR + Chart.js Dodged Bar</h1>
    <p>Click on the chart and use arrow keys to navigate. Press 'b' for braille, 't' for text descriptions.</p>

    <div style="width: 700px; height: 400px">
      <canvas id="dodged-bar-chart"></canvas>
    </div>

    <script>
      // Register the MAIDR plugin globally — every Chart.js chart on the page
      // becomes accessible automatically.
      Chart.register(maidrChartjs.maidrPlugin);

      // Multi-dataset bar charts where neither axis is stacked render as
      // grouped/dodged bars, and the MAIDR extractor maps them to
      // TraceType.DODGED.
      new Chart(document.getElementById('dodged-bar-chart'), {
        type: 'bar',
        data: {
          labels: ['Math', 'Science', 'English'],
          datasets: [
            { label: 'Grade A', data: [30, 35, 40], backgroundColor: '#4CAF50' },
            { label: 'Grade B', data: [45, 40, 35], backgroundColor: '#2196F3' },
            { label: 'Grade C', data: [20, 25, 15], backgroundColor: '#FF9800' },
          ],
        },
        options: {
          plugins: {
            title: { display: true, text: 'Student Grades by Subject' },
          },
          scales: {
            x: { title: { display: true, text: 'Subject' } },
            y: { title: { display: true, text: 'Count' }, beginAtZero: true },
          },
        },
      });
    </script>
  </body>
</html>
