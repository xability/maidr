name: CI

on:
  workflow_dispatch:
  pull_request:

permissions:
      contents: read

jobs:
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures commit history is pulled

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Commitlint
        run: npm run commitlint --verbose

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  # Fast Playwright smoke on every PR: chromium only, core bundle only, and
  # only the live-data spec (kept deliberately green). The full 3-browser
  # suite stays on the scheduled e2e workflows; extend the spec list here as
  # more specs are verified healthy.
  e2e-smoke:
    name: E2E Smoke (chromium)
    runs-on: ubuntu-latest
    needs: [commitlint, lint]
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Build core bundle
        run: node scripts/build.js core

      - name: Run smoke specs
        run: npx playwright test --config=e2e_tests/config/test-config.ts --project=chromium liveData.spec.ts
        env:
          CI: true

      # The smoke specs are kept green, so a failure here is a real
      # regression — ship the report and screenshots with the PR run.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-report
          path: |
            playwright-report/
            test-results/

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: [commitlint, lint]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [commitlint, lint]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [commitlint, lint]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

  # Mirrors the build steps of the Deploy Documentation workflow (docs.yml),
  # which otherwise only runs on pushes to main — so docs/example-app build
  # breakage surfaces on the PR instead of after merge.
  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    needs: [commitlint, lint]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build documentation site
        run: npm run docs
