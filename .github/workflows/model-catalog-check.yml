name: Model Catalog Check

# Weekly check that the curated LLM model catalog
# (src/service/modelVersions.ts) still matches what each provider serves.
# Providers whose API key secret is not configured are skipped. On drift,
# an issue is opened (or updated) with the report.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-model-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check catalog against provider APIs
        id: check
        # PIPESTATUS below is bash-specific; make the shell explicit.
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          node scripts/check-model-catalog.mjs 2>&1 | tee report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open or update drift issue
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.txt', 'utf8');
            const title = 'chore: LLM model catalog drift detected';
            const body = [
              'The weekly model catalog check found drift between the curated',
              'catalog (`src/service/modelVersions.ts`, `src/type/llm.ts`) and the',
              'models currently served by the providers.',
              '',
              '```',
              report.trim(),
              '```',
              '',
              '_Generated by `.github/workflows/model-catalog-check.yml`._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'model-catalog',
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['model-catalog', 'maintenance'],
              });
            }

      - name: Fail on drift
        if: steps.check.outputs.exit_code != '0'
        run: exit 1
